name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: openssl, mbstring, json
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite=unit --testdox

      - name: Run integration tests
        run: vendor/bin/phpunit --testsuite=integration --testdox

  phpstan:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyze --no-progress --error-format=github

  functional:
    name: Functional (PHP ${{ matrix.php }}, WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            wp: 'latest'
          - php: '8.3'
            wp: 'latest'
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_tmq_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mysqli, openssl, mbstring, xml, dom, simplexml
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is up."
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL did not become reachable in time." >&2
          exit 1

      - name: Bootstrap WP test environment
        run: |
          set -x
          bin/install-wp-tests.sh wp_tmq_tests root root 127.0.0.1:3306 true
          ls -la wp-tests-config.php
          head -20 wp-tests-config.php

      - name: Run functional tests
        run: vendor/bin/phpunit -c phpunit.functional.xml.dist --testdox

  phpcs:
    name: Coding standards (PHPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # Explicitly register the installed standards. The
      # dealerdirect/phpcodesniffer-composer-installer plugin normally handles
      # this, but registering paths here makes the build resilient if the
      # plugin is ever blocked or skipped.
      - name: Register PHPCS standards
        run: |
          vendor/bin/phpcs --config-set installed_paths \
            "vendor/wp-coding-standards/wpcs,vendor/phpcsstandards/phpcsutils,vendor/phpcsstandards/phpcsextra,vendor/phpcompatibility/php-compatibility,vendor/phpcompatibility/phpcompatibility-paragonie/PHPCompatibilityParagonieRandomCompat,vendor/phpcompatibility/phpcompatibility-paragonie/PHPCompatibilityParagonieSodiumCompat,vendor/phpcompatibility/phpcompatibility-wp"

      - name: Show PHPCS state
        run: |
          vendor/bin/phpcs --version
          vendor/bin/phpcs -i

      - name: Run PHPCS
        run: vendor/bin/phpcs --report=full --colors
